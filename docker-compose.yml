version: "3.9"

services:
  neo4j:
    image: neo4j:5-community
    container_name: archon-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI → http://localhost:7474
      - "7687:7687"   # Bolt protocol (Python driver)
    environment:
      NEO4J_AUTH: neo4j/archon-local
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    volumes:
      - F:/archon-graph/neo4j/data:/data
      - F:/archon-graph/neo4j/logs:/logs
      - F:/archon-graph/neo4j/plugins:/plugins
